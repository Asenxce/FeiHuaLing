# Server Configuration
server.port=${SERVER_PORT:8081}
server.address=0.0.0.0

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/feihualingbattle?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# JWT Configuration
jwt.secret=${JWT_SECRET:FeiHuaLingBattleSecretKey2024ForJWTTokenGenerationAndValidation}
jwt.expiration=604800

# 阿里云OSS Configuration (生产环境请通过环境变量覆盖)
aliyun.oss.endpoint=${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
aliyun.oss.accessKeyId=${OSS_ACCESS_KEY:your_access_key_id}
aliyun.oss.accessKeySecret=${OSS_ACCESS_SECRET:your_access_key_secret}
aliyun.oss.bucketName=${OSS_BUCKET:feihualing-avatar}
aliyun.oss.domain=${OSS_DOMAIN:https://feihualing-avatar.oss-cn-beijing.aliyuncs.com}
